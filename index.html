<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>more monitors ⇒ better programmer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --card-bg: #ffffff;
    --border: #e8e5e0;
    --border-hover: #d0cdc6;
    --text-primary: #1a1a1a;
    --text-secondary: #8a8580;
    --text-mono: #3d3833;
    --accent: #1a1a1a;
    --btn-bg: #1a1a1a;
    --btn-text: #faf9f7;
    --icon-color: #c5c0b9;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: 0 20px;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: env(safe-area-inset-top, 20px);
  }

  /* Screens */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* Logo */
  .logo-section {
    margin-top: 36px;
    margin-bottom: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    
  }
  .logo-img { width: 100%; height: auto; margin-bottom: 6px; }

  /* File Buttons */
  .file-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 32px;
    
  }

  .file-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 18px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-family: inherit;
  }
  .file-btn:hover { border-color: var(--border-hover); box-shadow: var(--shadow-md);  }
  .file-btn:active {  box-shadow: var(--shadow-sm); }
  .file-btn .icon { flex-shrink: 0; width: 22px; height: 22px; color: var(--icon-color); }
  .file-btn .filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text-mono);
    letter-spacing: -0.2px;
  }
  .file-btn.upload .filename { color: var(--text-secondary); font-weight: 400; }
  .upload-input { display: none; }

  /* Pairing screen */

  /* Scanner */

  /* Code viewer */
  .code-viewer {
    width: 100vw;
    min-height: 100dvh;
    background: #0d1117;
    color: #e6edf3;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    padding: 56px 0 32px 0;
    overflow: auto;
    white-space: pre;
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .code-viewer.active { display: block; }

  .code-line {
    display: block;
    padding: 0 16px 0 0;
    min-height: 1.75em;
  }
  .code-line:hover { background: rgba(136,198,255,0.04); }

  .code-viewer .line-num {
    display: inline-block;
    width: 44px;
    text-align: right;
    padding-right: 16px;
    margin-right: 12px;
    color: #484f58;
    user-select: none;
    border-right: 1px solid #21262d;
  }

  .viewer-toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    display: none;
    align-items: center;
    padding: 0 12px;
    z-index: 55;
    gap: 12px;
  }
  .viewer-toolbar.active { display: flex; }

  .viewer-back {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #8b949e;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .viewer-back:active { background: rgba(255,255,255,0.05); }

  .viewer-filename {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #8b949e;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .viewer-pair-btn {
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: #f0f6fc;
    background: #238636;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  .pair-qr-overlay {
    position: fixed;
    top: 48px;
    right: 8px;
    background: #ffffff;
    border-radius: 10px;
    padding: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    z-index: 60;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .pair-qr-overlay.active { display: flex; }

  .pair-qr-overlay canvas, .pair-qr-overlay img {
    border-radius: 4px;
  }

  .pair-qr-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #666;
    text-transform: uppercase;
  }

  .pair-qr-close {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    background: #1a1a1a;
    color: white;
    border: none;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .viewer-pair-btn:active { background: #2ea043; }

  /* Syntax colors — GitHub Dark theme */
  .syn-keyword { color: #ff7b72; }
  .syn-string { color: #a5d6ff; }
  .syn-comment { color: #8b949e; font-style: italic; }
  .syn-number { color: #79c0ff; }
  .syn-function { color: #d2a8ff; }
  .syn-class { color: #ffa657; }
  .syn-operator { color: #ff7b72; }
  .syn-builtin { color: #79c0ff; }
  .syn-decorator { color: #d2a8ff; }
  .syn-symbol { color: #ffa657; }
  .syn-regex { color: #7ee787; }
  .syn-const { color: #79c0ff; }
  .syn-param { color: #ffa657; }
  .syn-self { color: #ff7b72; font-style: italic; }
  .syn-punctuation { color: #8b949e; }

  /* Side indicator */

  /* Animations removed */
</style>
</head>

    'fall_in_deeper.rb': `module Love                                                                                                                                                                                             
  STAGES = [:curiosity, :infatuation, :vulnerability, :trust, :intimacy, :commitment, :comfortable_silence, :knowing, :yearning, :devotion, :belonging, :gratitude, :wonder, :acceptance, :peace].freeze
  TRANSITIONS = { curiosity: { linger: :infatuation, hesitate: :curiosity, run: nil }, infatuation: { open_up: :vulnerability, idealize: :infatuation, ghost: nil }, vulnerability: { stay: :trust, get_scared: :curiosity, be_honest: :trust } }
  TRANSITIONS.merge!({ trust: { let_in: :intimacy, test: :vulnerability, lean_on: :intimacy }, intimacy: { choose_daily: :commitment, take_for_granted: :trust, grow_together: :commitment }, commitment: { weather_storm: :comfortable_silence, keep_choosing: :knowing, forget_why: :trust } })
  TRANSITIONS.merge!({ comfortable_silence: { exist_together: :knowing, appreciate: :knowing, drift: :commitment }, knowing: { deepen: :knowing, begin_again: :curiosity, stay_forever: :knowing } })   
  DEPTH_MULTIPLIERS = { curiosity: 0.01, infatuation: 0.02, vulnerability: 0.04, trust: 0.03, intimacy: 0.03, commitment: 0.02, comfortable_silence: 0.015, knowing: 0.01 }.freeze                      
  HEART_EMOJIS = { curiosity: "💭", infatuation: "🦋", vulnerability: "🥺", trust: "🤝", intimacy: "💗", commitment: "💍", comfortable_silence: "☕", knowing: "❤️" }.freeze                                   
  RANDOM_MOMENTS = { curiosity: ["wondered what they were thinking about and whether they were thinking about me too", "found an excuse to be nearby and pretended it was a coincidence even though nothing about this feels coincidental anymore"] }
  RANDOM_MOMENTS.merge!({ infatuation: ["couldnt stop smiling and my face actually hurt from it", "reread old messages at 2am looking for hidden meaning in every word they typed and finding it everywhere"], vulnerability: ["said something id never said before to anyone and they held it gently", "cried in front of them and they didnt try to fix it they just stayed"] })
  RANDOM_MOMENTS.merge!({ trust: ["gave them the spare key and it felt like handing over a piece of my chest", "fell asleep on the phone together and woke up still connected"], intimacy: ["sat in silence and it felt like home feels when youve been away too long", "fought and came back softer than before like the breaking made us more whole"] })
  RANDOM_MOMENTS.merge!({ commitment: ["chose them over being right and it was the easiest hard thing ive ever done", "planned something six months away and for the first time the future felt like a place I wanted to live in"], comfortable_silence: ["grocery shopped like a sacred ritual", "knew their coffee order by heart and they knew mine and neither of us had to ask anymore"] })
  RANDOM_MOMENTS.merge!({ knowing: ["loved them more than yesterday and less than tomorrow and meant it completely", "looked over at them doing nothing special and thought you are my person and you always will be and I am so lucky it terrifies me"] })
  class FallInDeeper                                                                                                                                                                                    
    attr_reader :stage, :history, :days_together, :depth, :person_a, :person_b                                                                                                                          
    def initialize(person_a, person_b)                                                                                                                                                                  
      @person_a, @person_b, @stage, @days_together, @depth = person_a, person_b, :curiosity, 0, 0.0                                                                                                     
      @history = [{ stage: :curiosity, day: 0, moment: "noticed each other across a room full of people who didnt matter and something ancient and electric passed between them like a secret the universe had been keeping" }]
    end                                                                                                                                                                                                 
    def day_passes(moment = nil)                                                                                                                                                                        
      @days_together += 1; @depth += (DEPTH_MULTIPLIERS[@stage] || 0.01); moment ||= (RANDOM_MOMENTS[@stage] || ["existed together quietly and that was enough"]).sample; puts "  Day #{@days_together}: #{moment}"
    end                                                                                                                                                                                                 
    def feel(action)                                                                                                                                                                                    
      action = action.to_sym; transitions = TRANSITIONS[@stage]; return puts("  That doesnt feel right in #{@stage} — not every action fits every season and thats okay — some feelings need time to find their shape") unless transitions&.key?(action)
      new_stage = transitions[action]                                                                                                                                                                   
      if new_stage.nil? then puts("  💔 And just like that it ended — some stories are short — still worth reading — still worth having lived — still proof that the heart can open even when it knows it might break"); return self; end
      old_stage = @stage; @stage = new_stage; @history << { stage: @stage, day: @days_together, moment: action.to_s }                                                                                   
      puts "  #{HEART_EMOJIS[old_stage] || "💙"} #{old_stage} ──[#{action}]──▶ #{HEART_EMOJIS[@stage] || "💙"} #{@stage}     (depth: #{"█" * (@depth * 30).to_i}#{"░" * (30 - (@depth * 30).to_i)} #{(@depth * 100).round(1)}%)"
      self                                                                                                                                                                                              
    end                                                                                                                                                                                                 
    def depth_check                                                                                                                                                                                     
      puts "\\n  ─── depth: #{"█" * (@depth * 40).to_i}#{"░" * (40 - (@depth * 40).to_i)} #{(@depth * 100).round(1)}% ─── stage: #{HEART_EMOJIS[@stage]} #{@stage} ─── days: #{@days_together} ─── moments: #{@history.length} ───"
    end                                                                                                                                                                                                 
    def their_story                                                                                                                                                                                     
      puts "\\n" + "═" * 200; puts "  📖 #{@person_a} & #{@person_b} — #{@days_together} days together — depth: #{(@depth * 100).round(1)}% — current stage: #{HEART_EMOJIS[@stage]} #{@stage} — moments shared: #{@history.length}"; puts "═" * 200
      @history.each_with_index do |entry, i|                                                                                                                                                            
        prefix = i.zero? ? "  Day 0  " : "  Day #{entry[:day].to_s.rjust(3)} "; puts "#{prefix} #{HEART_EMOJIS[entry[:stage]] || "💙"} #{entry[:stage].to_s.ljust(22)} #{entry[:moment]}"                
      end                                                                                                                                                                                               
      puts "═" * 200                                                                                                                                                                                    
    end

if __FILE__ == $PROGRAM_NAME                                                                                                                                                                            
  puts "\\n  💌 A story in stages — because falling in love is not a single event — it is a series of small surrenders — each one braver than the last — each one proof that the heart knows things the mind will never understand\\n"

    for (let i = 0; i < 255; i++) { GF[i] = v; GL[v] = i; v = (v << 1) ^ (v >= 128 ? 0x11d : 0); }

    function gfMul(a, b) { return a === 0 || b === 0 ? 0 : GF[(GL[a] + GL[b]) % 255]; }

    function rsGenPoly(n) {
      let p = [1];
      for (let i = 0; i < n; i++) {
        const np = new Array(p.length + 1).fill(0);
        for (let j = 0; j < p.length; j++) {
          np[j] ^= p[j];
          np[j + 1] ^= gfMul(p[j], GF[i]);
        }
        p = np;
      }
      return p;
    }

    function rsEncode(data, ecLen) {
      const gen = rsGenPoly(ecLen);
      const msg = new Uint8Array(data.length + ecLen);
      msg.set(data);
      for (let i = 0; i < data.length; i++) {
        const coef = msg[i];
        if (coef !== 0) for (let j = 0; j < gen.length; j++) msg[i + j] ^= gfMul(gen[j], coef);
      }
      return msg.slice(data.length);
    }

    // Version/EC info for L level
    const VER_INFO = [
      null,
      {cap:17,ecPerBlock:7,blocks:1,dcPerBlock:19},   // v1
      {cap:28,ecPerBlock:10,blocks:1,dcPerBlock:34},   // v2
      {cap:44,ecPerBlock:15,blocks:1,dcPerBlock:55},   // v3
      {cap:64,ecPerBlock:20,blocks:1,dcPerBlock:80},   // v4
      {cap:86,ecPerBlock:26,blocks:1,dcPerBlock:108},  // v5
      {cap:108,ecPerBlock:18,blocks:2,dcPerBlock:68},  // v6
      {cap:124,ecPerBlock:20,blocks:2,dcPerBlock:78},  // v7
      {cap:154,ecPerBlock:24,blocks:2,dcPerBlock:97},  // v8
      {cap:182,ecPerBlock:30,blocks:2,dcPerBlock:116}, // v9
      {cap:216,ecPerBlock:18,blocks:2,dcPerBlock:68,blocks2:2,dcPerBlock2:69}, // v10
    ];

    function chooseVersion(len) {
      for (let v = 1; v <= 10; v++) {
        const info = VER_INFO[v];
        let totalDc = info.dcPerBlock * info.blocks;
        if (info.blocks2) totalDc += info.dcPerBlock2 * info.blocks2;
        if (len + 3 <= totalDc) return v; // +3 for mode indicator + length + terminator overhead
      }
      return 10;
    }

    function encode(text) {
      const bytes = new TextEncoder().encode(text);
      const ver = chooseVersion(bytes.length);
      const info = VER_INFO[ver];
      const size = ver * 4 + 17;

      // Build data codewords
      let totalDc = info.dcPerBlock * info.blocks;
      if (info.blocks2) totalDc += info.dcPerBlock2 * info.blocks2;

      const bits = [];
      function pushBits(val, len) { for (let i = len - 1; i >= 0; i--) bits.push((val >> i) & 1); }

      pushBits(0b0100, 4); // byte mode
      pushBits(bytes.length, ver <= 9 ? 8 : 16);
      for (const b of bytes) pushBits(b, 8);
      pushBits(0, Math.min(4, totalDc * 8 - bits.length)); // terminator
      while (bits.length % 8 !== 0) bits.push(0);
      while (bits.length < totalDc * 8) {
        pushBits(0xEC, 8);
        if (bits.length < totalDc * 8) pushBits(0x11, 8);
      }

      const data = new Uint8Array(totalDc);
      for (let i = 0; i < totalDc; i++) {
        let v2 = 0;
        for (let b = 0; b < 8; b++) v2 = (v2 << 1) | (bits[i * 8 + b] || 0);
        data[i] = v2;
      }

      // Split into blocks and compute EC
      const dataBlocks = [], ecBlocks = [];
      let offset = 0;
      for (let i = 0; i < info.blocks; i++) {
        const block = data.slice(offset, offset + info.dcPerBlock);
        dataBlocks.push(block);
        ecBlocks.push(rsEncode(block, info.ecPerBlock));
        offset += info.dcPerBlock;
      }
      if (info.blocks2) {
        for (let i = 0; i < info.blocks2; i++) {
          const block = data.slice(offset, offset + info.dcPerBlock2);
          dataBlocks.push(block);
          ecBlocks.push(rsEncode(block, info.ecPerBlock));
          offset += info.dcPerBlock2;
        }
      }

      // Interleave
      const allCodewords = [];
      const maxDc = Math.max(info.dcPerBlock, info.dcPerBlock2 || 0);
      for (let i = 0; i < maxDc; i++)
        for (const blk of dataBlocks) if (i < blk.length) allCodewords.push(blk[i]);
      for (let i = 0; i < info.ecPerBlock; i++)
        for (const blk of ecBlocks) if (i < blk.length) allCodewords.push(blk[i]);

      // Create matrix
      const matrix = Array.from({length: size}, () => new Int8Array(size)); // 0=white, 1=black, unset=0
      const reserved = Array.from({length: size}, () => new Uint8Array(size)); // 1=reserved

      function setModule(r, c, val) { matrix[r][c] = val ? 1 : 0; reserved[r][c] = 1; }

      // Finder patterns
      function drawFinder(row, col) {
        for (let dr = -1; dr <= 7; dr++) for (let dc = -1; dc <= 7; dc++) {
          const r = row + dr, c = col + dc;
          if (r < 0 || r >= size || c < 0 || c >= size) continue;
          const ring = Math.max(Math.abs(dr - 3), Math.abs(dc - 3));
          setModule(r, c, ring !== 2 && ring !== 4);
        }
      }
      drawFinder(0, 0); drawFinder(0, size - 7); drawFinder(size - 7, 0);

      // Alignment patterns (v >= 2)
      if (ver >= 2) {
        const positions = [6, [6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50]][ver];
        const pts = Array.isArray(positions) ? positions : [positions];
        for (const r of pts) for (const c of pts) {
          if (reserved[r] && reserved[r][c]) continue;
          for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
            setModule(r + dr, c + dc, Math.abs(dr) === 2 || Math.abs(dc) === 2 || (dr === 0 && dc === 0));
          }
        }
      }

      // Timing patterns
      for (let i = 8; i < size - 8; i++) {
        if (!reserved[6][i]) setModule(6, i, i % 2 === 0);
        if (!reserved[i][6]) setModule(i, 6, i % 2 === 0);
      }

      // Dark module + reserved areas for format info
      setModule(size - 8, 8, 1);
      for (let i = 0; i < 15; i++) {
        // Around top-left finder
        if (i <= 5) { if(!reserved[8][i]) setModule(8, i, 0); if(!reserved[i][8]) setModule(i, 8, 0); }
        else if (i === 6) { if(!reserved[8][7]) setModule(8, 7, 0); if(!reserved[7][8]) setModule(7, 8, 0); }
        else if (i === 7) { if(!reserved[8][8]) setModule(8, 8, 0); if(!reserved[8][8]) setModule(8, 8, 0); }
        else if (i === 8) { if(!reserved[8][size-8]) setModule(8, size-8, 0); if(!reserved[size-7][8]) setModule(size-7, 8, 0); }
        else { 
          const j = 14 - i;
          if(!reserved[8][size-j-1]) setModule(8, size - j - 1, 0);
          if(!reserved[size-j-1][8]) setModule(size - j - 1, 8, 0);
        }
      }

      // Place data bits using mask 0 (checkerboard)
      const allBits = [];
      for (const cw of allCodewords) for (let b = 7; b >= 0; b--) allBits.push((cw >> b) & 1);

      let bitIdx = 0;
      let upward = true;
      for (let col = size - 1; col >= 1; col -= 2) {
        if (col === 6) col = 5; // skip timing
        const rows = upward ? Array.from({length: size}, (_, i) => size - 1 - i) : Array.from({length: size}, (_, i) => i);
        for (const row of rows) {
          for (let dc = 0; dc <= 1; dc++) {
            const c = col - dc;
            if (reserved[row][c]) continue;
            const bit = bitIdx < allBits.length ? allBits[bitIdx] : 0;
            const mask = (row + c) % 2 === 0; // mask pattern 0
            matrix[row][c] = bit ^ mask ? 1 : 0;
            bitIdx++;
          }
        }
        upward = !upward;
      }

      // Format info (mask 0, EC level L = 01)
      const FORMAT_BITS = 0x77C4; // pre-computed for L, mask 0
      for (let i = 0; i < 15; i++) {
        const bit = (FORMAT_BITS >> i) & 1;
        // Horizontal
        if (i < 6) matrix[8][i] = bit;
        else if (i < 8) matrix[8][i + 1] = bit;
        else matrix[8][size - 15 + i] = bit;
        // Vertical
        if (i < 8) matrix[size - 1 - i][8] = bit;
        else if (i < 9) matrix[15 - i][8] = bit;
        else matrix[14 - i][8] = bit;
      }

      return {matrix, size};
    }

    return {encode};
  })();

  function generateQR(canvas, text) {
    const {matrix, size} = QR.encode(text);
    const scale = Math.floor(canvas.width / (size + 8)); // quiet zone
    const offset = Math.floor((canvas.width - size * scale) / 2);
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000000';
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        if (matrix[r][c]) {
          ctx.fillRect(offset + c * scale, offset + r * scale, scale, scale);
        }
      }
    }
  }

  function togglePairQR() {
    const overlay = document.getElementById('pairQROverlay');
    if (overlay.classList.contains('active')) {
      closePairQR();
      return;
    }

    const url = window.location.href.split('#')[0] + '#file=' + encodeURIComponent(selectedFile);

    const container = document.getElementById('pairQRCode');
    container.innerHTML = '';
    const canvas = document.createElement('canvas');
    canvas.width = 140;
    canvas.height = 140;
    canvas.style.borderRadius = '4px';
    container.appendChild(canvas);
    generateQR(canvas, url);

    overlay.classList.add('active');
  }

  function closePairQR() {
    document.getElementById('pairQROverlay').classList.remove('active');
  }

  function closeViewer() {
    document.getElementById('codeViewer').classList.remove('active');
    document.getElementById('viewerToolbar').classList.remove('active');
    document.getElementById('sideIndicator').style.display = 'none';
    closePairQR();
    document.querySelector('.container').style.display = 'flex';
    showScreen('homeScreen');
    // Clear hash
    history.replaceState(null, '', window.location.pathname);
  }

  // Auto-open file if URL has #file=filename
  function checkHashAndOpen() {
    const hash = window.location.hash;
    if (hash.startsWith('#file=')) {
      const filename = decodeURIComponent(hash.slice(6));
      if (SAMPLE_FILES[filename]) {
        selectedFile = filename;
        selectedCode = SAMPLE_FILES[filename];
        showFullCodeViewer();
      }
    }
  }
  checkHashAndOpen();

  function showFullCodeViewer() {
    const viewer = document.getElementById('codeViewer');
    const toolbar = document.getElementById('viewerToolbar');
    const fnLabel = document.getElementById('viewerFilename');

    fnLabel.textContent = selectedFile;

    const ext = selectedFile.split('.').pop();
    const lines = selectedCode.split('\n');

    viewer.innerHTML = lines.map((line, i) => {
      const num = i + 1;
      const highlighted = highlightLine(line, ext);
      return `<span class="code-line"><span class="line-num">${num}</span>${highlighted}</span>`;
    }).join('\n');

    toolbar.classList.add('active');
    viewer.classList.add('active');
    document.querySelector('.container').style.display = 'none';
  }

  // ==================== SYNTAX HIGHLIGHTER ====================
  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function highlightLine(line, ext) {
    const escaped = escapeHtml(line);

    // Comment detection first (whole-line or inline)
    const commentPatterns = {
      py: /^(\s*)(#.*)$/,
      rb: /^(\s*)(#.*)$/,
      js: /^(\s*)(\/\/.*)$/
    };
    const cp = commentPatterns[ext];
    if (cp) {
      const cm = escaped.match(ext === 'js' ? /^(\s*)(\/\/.*)$/ : /^(\s*)(#.*)$/);
      if (cm) return cm[1] + `<span class="syn-comment">${cm[2]}</span>`;
    }

    let result = escaped;

    // Strings (handle triple quotes, double, single, backticks)
    result = result.replace(/("""[\s\S]*?"""|'''[\s\S]*?'''|`[^`]*`|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,
      '<span class="syn-string">$1</span>');

    // Decorators (Python/Ruby)
    if (ext === 'py') {
      result = result.replace(/(@\w+)/g, '<span class="syn-decorator">$1</span>');
    }

    // Numbers
    result = result.replace(/\b(\d+\.?\d*)\b/g, '<span class="syn-number">$1</span>');

    // Keywords per language
    const keywords = {
      py: /\b(import|from|class|def|return|if|else|elif|for|while|in|not|and|or|is|None|True|False|try|except|raise|with|as|yield|async|await|pass|break|continue|lambda|print|self|__init__|__name__|__FILE__)\b/g,
      rb: /\b(module|class|def|end|do|if|else|elsif|unless|while|until|for|in|return|require|include|attr_reader|attr_accessor|puts|raise|begin|rescue|yield|self|true|false|nil|then|case|when|frozen_string_literal|PROGRAM_NAME)\b/g,
      js: /\b(const|let|var|function|class|return|if|else|for|while|do|switch|case|break|continue|new|this|import|export|from|async|await|try|catch|throw|typeof|instanceof|null|undefined|true|false|console|Math|Date|Promise|setTimeout|clearInterval|setInterval)\b/g
    };

    if (keywords[ext]) {
      result = result.replace(keywords[ext], (match) => {
        if (match === 'self' || match === 'this') return `<span class="syn-self">${match}</span>`;
        if (['True', 'False', 'true', 'false', 'nil', 'None', 'null', 'undefined'].includes(match))
          return `<span class="syn-const">${match}</span>`;
        return `<span class="syn-keyword">${match}</span>`;
      });
    }

    // Function/method definitions
    result = result.replace(/(def|function|class)\s+(<span[^>]*>)([^<]+)(<\/span>)\s+(\w+)/g,
      '$1 $2$3$4 <span class="syn-function">$5</span>');
    // Simpler pattern for unmatched
    result = result.replace(/\b(def|function)\b(\s+)(\w+)/g,
      '<span class="syn-keyword">$1</span>$2<span class="syn-function">$3</span>');

    // Class names after class keyword
    result = result.replace(/\bclass\b(\s+)(\w+)/g,
      '<span class="syn-keyword">class</span>$1<span class="syn-class">$2</span>');

    // Symbols (Ruby)
    if (ext === 'rb') {
      result = result.replace(/(:\w+)/g, '<span class="syn-symbol">$1</span>');
      result = result.replace(/(%[iIwW]\[)/g, '<span class="syn-symbol">$1</span>');
    }

    // Regex
    result = result.replace(/(\/(?:[^\/\\]|\\.)+\/[gimsy]*)/g, '<span class="syn-regex">$1</span>');

    // Operators
    result = result.replace(/(\+=|-=|\*=|\/=|===|!==|==|!=|=>|&lt;=|&gt;=|&amp;&amp;|\|\||\.\.\.)/g,
      '<span class="syn-operator">$1</span>');

    return result;
  }

  document.getElementById('fileUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        selectedFile = file.name;
        selectedCode = ev.target.result;
        showFullCodeViewer();
      };
      reader.readAsText(file);
    }
  });

  // ==================== CODE VIEWER ====================
  function showCodeViewer(side) {
    mySide = side;
    const viewer = document.getElementById('codeViewer');
    const toolbar = document.getElementById('viewerToolbar');
    const fnLabel = document.getElementById('viewerFilename');
    const indicator = document.getElementById('sideIndicator');
    const label = document.getElementById('sideLabel');

    fnLabel.textContent = selectedFile;
    const ext = selectedFile.split('.').pop();
    const lines = selectedCode.split('\n');
    const midpoint = Math.ceil(lines.length / 2);

    let displayLines;
    if (side === 'left') {
      displayLines = lines.slice(0, midpoint);
      indicator.className = 'side-indicator left';
    } else {
      displayLines = lines.slice(midpoint);
      indicator.className = 'side-indicator right';
    }

    const startNum = side === 'left' ? 1 : midpoint + 1;

    viewer.innerHTML = displayLines.map((line, i) => {
      const num = startNum + i;
      const highlighted = highlightLine(line, ext);
      return `<span class="code-line"><span class="line-num">${num}</span>${highlighted}</span>`;
    }).join('\n');

    label.textContent = side;
    indicator.style.display = 'block';
    toolbar.classList.add('active');
    viewer.classList.add('active');
    document.querySelector('.container').style.display = 'none';
  }

</script>
